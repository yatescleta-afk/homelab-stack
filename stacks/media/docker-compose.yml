services:
  jellyfin:
    image: jellyfin/jellyfin:10.10.7
    container_name: jellyfin
    restart: unless-stopped
    volumes:
      - /data/media:/media:ro
      - jellyfin-config:/config
    devices:
      - /dev/dri:/dev/dri   # hardware transcoding
    environment:
      - TZ=America/Los_Angeles
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.jellyfin.rule=Host(`jellyfin.${DOMAIN}`)"
      - "traefik.http.routers.jellyfin.entrypoints=websecure"
      - "traefik.http.services.jellyfin.loadbalancer.server.port=8096"
    healthcheck:
      test: interval: 30s
      timeout: 10s
      retries: 3

  sonarr:
    image: linuxserver/sonarr:4.0.13
    container_name: sonarr
    restart: unless-stopped
    volumes:
      - /data:/data
      - sonarr-config:/config
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sonarr.rule=Host(`sonarr.${DOMAIN}`)"
      - "traefik.http.routers.sonarr.entrypoints=websecure"
      - "traefik.http.services.sonarr.loadbalancer.server.port=8989"
    depends_on:
      qbittorrent:
        condition: service_healthy

  radarr:
    image: linuxserver/radarr:5.20.3
    container_name: radarr
    restart: unless-stopped
    volumes:
      - /data:/data
      - radarr-config:/config
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.radarr.rule=Host(`radarr.${DOMAIN}`)"
      - "traefik.http.routers.radarr.entrypoints=websecure"
      - "traefik.http.services.radarr.loadbalancer.server.port=7878"
    depends_on:
      qbittorrent:
        condition: service_healthy

  qbittorrent:
    image: linuxserver/qbittorrent:5.0.4
    container_name: qbittorrent
    restart: unless-stopped
    volumes:
      - /data:/data
      - qbittorrent-config:/config
    environment:
      - TZ=America/Los_Angeles
      - PUID=1000
      - PGID=1000
      - WEBUI_PORT=8080
    networks:
      - proxy
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.bt.rule=Host(`bt.${DOMAIN}`)"
      - "traefik.http.routers.bt.entrypoints=websecure"
      - "traefik.http.services.bt.loadbalancer.server.port=8080"
    healthcheck:
      test: interval: 30s
      timeout: 10s
      retries: 3

networks:
  proxy:
    external: true

volumes:
  jellyfin-config:
  sonarr-config:
  radarr-config:
  qbittorrent-config: